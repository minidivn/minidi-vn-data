<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MiniDi — Vietnam Knowledge Graph</title>
<meta name="description" content="Kham pha du lieu WikiData ve Viet Nam: lich su, dia ly, nhan vat, van hoa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b17;--bg2:#0f172a;--bg3:#1e293b;--a1:#6366f1;--a2:#06b6d4;--a3:#a78bfa;--a1d:rgba(99,102,241,.15);--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--ok:#22c55e;--warn:#eab308;--sm:6px;--md:10px;--lg:16px;--tr:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
/* ── Loading Screen ── */
#splash{z-index:999;position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity .8s,transform .8s}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-ring{width:80px;height:80px;border-radius:50%;border:3px solid var(--bg3);border-top-color:var(--a1);border-right-color:var(--a2);animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.splash-logo{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.splash-sub{color:var(--text3);font-size:.9rem;margin-bottom:20px}
.progress-track{width:240px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:2px;transition:width .3s}
.splash-pct{color:var(--text3);font-size:.75rem;margin-top:8px}
/* ── Hero with Slideshow ── */
.hero{position:relative;text-align:center;padding:64px 24px 40px;overflow:hidden;min-height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s ease;filter:brightness(.35) saturate(.8)}
.hero-slide.active{opacity:1}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--bg) 90%)}
.hero-content{position:relative;z-index:1;max-width:700px}
.hero h1{font-size:2.8rem;font-weight:800;margin-bottom:12px}
.gradient-text{background:linear-gradient(135deg,var(--a1),var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);line-height:1.6;font-size:.95rem;margin-bottom:8px}
.stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-top:20px}
.stat{text-align:center}
.stat .num{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{color:var(--text3);font-size:.78rem;margin-top:2px}
.header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:rgba(7,11,23,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.05rem;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--a1),var(--a2));border-radius:7px;display:inline-flex;align-items:center;justify-content:center}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;background:var(--bg3);border:1px solid rgba(255,255,255,.07);border-radius:var(--md);color:var(--text);font-size:.88rem;outline:none;transition:var(--tr)}
.search-wrap input:focus{border-color:var(--a1);box-shadow:0 0 20px var(--a1d)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem}
.lang-wrap{display:flex;background:var(--bg3);border-radius:var(--sm);overflow:hidden}
.lang-btn{padding:5px 11px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:.78rem;font-weight:500;transition:var(--tr)}
.lang-btn.active{background:var(--a1);color:#fff}
.container{max-width:840px;margin:0 auto;padding:0 20px}
#status{text-align:center;padding:6px;font-size:.82rem;color:var(--warn);min-height:28px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.fbtn{padding:4px 13px;border:1px solid rgba(255,255,255,.07);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.76rem;transition:var(--tr)}
.fbtn:hover{border-color:var(--a1);color:var(--a1)}
.fbtn.active{background:var(--a1d);border-color:var(--a1);color:var(--a1)}
.era-bar{display:flex;gap:5px;overflow-x:auto;padding:6px 0;margin:8px 0}
.ebtn{flex-shrink:0;padding:4px 11px;border:1px solid rgba(255,255,255,.07);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;font-size:.7rem;white-space:nowrap;transition:var(--tr)}
.ebtn:hover{border-color:var(--a2);color:var(--a2)}
.ebtn.active{background:var(--a2);border-color:var(--a2);color:#fff}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:var(--md);padding:13px 17px;margin-bottom:7px;cursor:pointer;transition:var(--tr)}
.card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.card-hdr{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
.card-title{font-size:.95rem;font-weight:600;color:var(--a1)}
.card-title-vi{font-size:.78rem;color:var(--text3);font-style:italic}
.badge{font-size:.63rem;padding:1px 9px;border-radius:20px;font-weight:500}
.badge-place{background:rgba(34,197,94,.15);color:var(--ok)}
.badge-person{background:rgba(99,102,241,.15);color:var(--a1)}
.badge-event{background:rgba(234,179,8,.15);color:var(--warn)}
.badge-other{background:var(--bg3);color:var(--text3)}
.card-desc{color:var(--text2);font-size:.83rem;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-note{font-size:.68rem;color:var(--text3);margin-top:3px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.panel{background:var(--bg2);border:1px solid rgba(255,255,255,.07);border-radius:var(--lg);padding:28px;max-width:600px;width:92%;max-height:85vh;overflow-y:auto;position:relative}
.p-close{position:absolute;top:10px;right:14px;font-size:1.4rem;cursor:pointer;color:var(--text3);background:none;border:none}
.p-close:hover{color:var(--text)}
.p-title{font-size:1.25rem;font-weight:700}
.p-title-vi{font-size:.9rem;color:var(--text3);margin-bottom:6px}
.p-desc{color:var(--text2);line-height:1.6;margin:10px 0;font-size:.88rem}
.p-meta{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:.78rem;margin:10px 0}
.p-meta dt{color:var(--text3)}.p-meta dd{color:var(--text);word-break:break-all}
.p-sec{margin-top:12px}
.p-sec h3{font-size:.85rem;color:var(--a2);margin-bottom:6px}
.p-rel{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:.78rem;color:var(--text);cursor:pointer}
.p-rel:hover{color:var(--a1)}
.rarr{color:var(--text3);margin:0 3px}
.pag{text-align:center;display:flex;gap:8px;justify-content:center;margin-top:10px}
.footer{text-align:center;padding:24px;color:var(--text3);font-size:.78rem;border-top:1px solid rgba(255,255,255,.07);margin-top:40px}
.footer a{color:var(--a1);text-decoration:none}
.footer a:hover{text-decoration:underline}
/* Slideshow dots */
.slide-dots{display:flex;gap:6px;margin-top:16px;position:relative;z-index:1}
.slide-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:var(--tr)}
.slide-dot.active{background:#fff;transform:scale(1.2)}
@media(max-width:768px){
  .hero h1{font-size:1.7rem}
  .hero{min-height:300px;padding:40px 16px 24px}
  .stats{gap:14px}
  .stat .num{font-size:1.2rem}
  .panel{padding:20px}
  .p-meta{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ── Loading Splash ── -->
<div id=splash>
  <div class=splash-logo>&#x1F1FB;&#x1F1F3; MiniDi</div>
  <div class=splash-ring></div>
  <div class=splash-sub id=splash-msg>Loading Vietnam knowledge graph...</div>
  <div class=progress-track><div class=progress-bar id=progress-bar></div></div>
  <div class=splash-pct id=splash-pct>0%</div>
</div>

<!-- ── Header ── -->
<div class=header>
  <div class=logo><span class=logo-icon>&#x1F577;</span><span>MiniDi</span></div>
  <div class=search-wrap>
    <span class=search-icon>&#x1F50D;</span>
    <input type=text id=search-input placeholder="Search... | Tim kiem..." oninput=onSearch()>
  </div>
  <div class=lang-wrap>
    <button class="lang-btn active" id=lang-en onclick="setLang('en')">EN</button>
    <button class=lang-btn id=lang-vi onclick="setLang('vi')">VI</button>
  </div>
</div>

<!-- ── Hero ── -->
<div class=hero id=hero>
  <div class=hero-bg id=hero-bg></div>
  <div class=hero-overlay></div>
  <div class=hero-content>
    <h1><span class=gradient-text>&#x1F1FB;&#x1F1F3; Vietnam Knowledge Graph</span></h1>
    <p id=hero-sub>Exploring WikiData entities: history, geography, people & culture</p>
    <div class=stats>
      <div class=stat><div class=num id=s-total>--</div><div class=lbl data-en=Entities data-vi="Thuc the">Entities</div></div>
      <div class=stat><div class=num id=s-event>--</div><div class=lbl data-en=Events data-vi="Su kien">Events</div></div>
      <div class=stat><div class=num id=s-person>--</div><div class=lbl data-en=People data-vi="Nhan vat">People</div></div>
      <div class=stat><div class=num id=s-place>--</div><div class=lbl data-en=Places data-vi="Dia danh">Places</div></div>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div class=container>
  <div class=filter-bar>
    <button class="fbtn active" onclick="setF('all')" data-en=All data-vi="Tat ca">All</button>
    <button class=fbtn onclick="setF('place')" data-en=Places data-vi="Dia danh">Places</button>
    <button class=fbtn onclick="setF('person')" data-en=People data-vi="Nhan vat">People</button>
    <button class=fbtn onclick="setF('event')" data-en=Events data-vi="Su kien">Events</button>
  </div>
  <div class=era-bar>
    <button class=ebtn onclick="setE('hong_bang')">&#x1F3EE; Hong Bang</button>
    <button class=ebtn onclick="setE('chinese_domination')">&#x1F4DC; Chinese Dom.</button>
    <button class=ebtn onclick="setE('dynastic_vn')">&#x1F3EF; Dynastic</button>
    <button class=ebtn onclick="setE('colonial')">&#x1F3DB; Colonial</button>
    <button class=ebtn onclick="setE('vietnam_war')">&#x2694; Vietnam War</button>
    <button class=ebtn onclick="setE('modern')">&#x1F3D9; Modern</button>
  </div>
  <div id=status></div>
  <div id=results></div>
  <div id=pag></div>
</div>

<div class=overlay id=overlay onclick="closeD(event)">
  <div class=panel><button class=p-close onclick="closeD()">&times;</button><div id=dc></div></div>
</div>

<div class=footer>
  <span data-en="Data from WikiData - CC0. Built with " data-vi="Du lieu tu WikiData - CC0. Xay dung voi ">Data from WikiData - CC0. Built with</span>
  <a href=https://github.com/minidivn/minidi-spider>minidi-spider</a> &middot;
  <a href=https://github.com/minidivn/minidi-vn-data>source</a> &middot;
  <a href=https://query.wikidata.org/sparql>SPARQL</a>
</div>

<script>
// ── Slideshow images (Wikimedia Commons - Vietnam) ──
// Pre-loaded background images that fade in sequence
var SLIDES = [
  'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Ha_Long_Bay_%282%29.jpg/1200px-Ha_Long_Bay_%282%29.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/2018_Vietnam_Rice_Terrace_Fields.jpg/1200px-2018_Vietnam_Rice_Terrace_Fields.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Saigon_at_night.jpg/1200px-Saigon_at_night.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/0/02/Hue_Citadel.jpg/1200px-Hue_Citadel.jpg',
  'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Mu_Cang_Chai_rice_terraces.jpg/1200px-Mu_Cang_Chai_rice_terraces.jpg'
];
var slideIdx = 0, slideTimer = null;

function initSlideshow() {
  var bg = document.getElementById('hero-bg');
  var dots = document.createElement('div');
  dots.className = 'slide-dots';
  dots.id = 'slide-dots';
  document.getElementById('hero').appendChild(dots);
  SLIDES.forEach(function(url, i) {
    var img = new Image();
    img.onload = function() {
      var div = document.createElement('div');
      div.className = 'hero-slide' + (i === 0 ? ' active' : '');
      div.style.backgroundImage = 'url(' + url + ')';
      bg.appendChild(div);
      var dot = document.createElement('div');
      dot.className = 'slide-dot' + (i === 0 ? ' active' : '');
      dot.onclick = function() { goSlide(i); };
      document.getElementById('slide-dots').appendChild(dot);
    };
    img.src = url;
  });
}

function goSlide(i) {
  slideIdx = i;
  var slides = document.querySelectorAll('.hero-slide');
  var dots = document.querySelectorAll('.slide-dot');
  slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
  dots.forEach(function(d, idx) { d.classList.toggle('active', idx === i); });
}

function nextSlide() {
  goSlide((slideIdx + 1) % SLIDES.length);
}

// ── State ──
var IX = null, _F = 'all', _E = null, _L = 'en', _P = 0, PS = 40, bm = null;
var MODEL = null, MR = false;

// ── Load with progress ──
function loadData() {
  var pr = document.getElementById('progress-bar');
  var pp = document.getElementById('splash-pct');
  var pm = document.getElementById('splash-msg');

  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'index.json', true);
  xhr.responseType = 'arraybuffer';

  xhr.onprogress = function(e) {
    if (e.lengthComputable) {
      var pct = Math.round((e.loaded / e.total) * 100);
      pr.style.width = pct + '%';
      pp.textContent = pct + '% (' + (e.loaded / 1048576).toFixed(1) + '/' + (e.total / 1048576).toFixed(1) + ' MB)';
      pm.textContent = pct < 30 ? 'Downloading Vietnam knowledge graph...' : 'Parsing entity data...';
    }
  };

  xhr.onload = function() {
    try {
      var raw = new TextDecoder('utf-8').decode(xhr.response);
      IX = JSON.parse(raw);
      pr.style.width = '100%';
      pp.textContent = '100%';
      pm.textContent = IX.meta.entity_count + ' entities loaded!';
      setTimeout(function() {
        document.getElementById('splash').classList.add('hide');
        initSlideshow();
        slideTimer = setInterval(nextSlide, 5000);
        updStats();
        showP(0);
        document.getElementById('status').textContent = IX.meta.entity_count.toLocaleString() + ' entities';
      }, 400);
    } catch(e) {
      pm.textContent = 'Error parsing data: ' + e.message;
    }
  };

  xhr.onerror = function() {
    pm.textContent = 'Failed to load index.json - check that it exists in the same directory';
    pr.style.background = 'var(--warn)';
  };

  xhr.send();
}

function updStats() {
  if (!IX) return;
  var t = {place:0,person:0,event:0,concept:0,other:0};
  IX.nodes.forEach(function(n) { var k = n.t || 'other'; t[k] = (t[k] || 0) + 1; });
  document.getElementById('s-total').textContent = IX.meta.entity_count.toLocaleString();
  document.getElementById('s-event').textContent = (t.event || 0).toLocaleString();
  document.getElementById('s-person').textContent = (t.person || 0).toLocaleString();
  document.getElementById('s-place').textContent = (t.place || 0).toLocaleString();
}

// ── BM25 ──
function buildBM(ns) {
  var k1 = 1.5, b = 0.75, N = ns.length, ad = 0, ln = [], tf = [], df = {};
  for (var i = 0; i < N; i++) {
    var txt = ((ns[i].l || '') + ' ' + (ns[i].lv || '') + ' ' + (ns[i].d || '')).toLowerCase();
    var tr = txt.split(/\s+/).filter(function(t) { return t.length > 1; });
    ln.push(tr.length); ad += tr.length;
    var ft = {};
    tr.forEach(function(t) { ft[t] = (ft[t] || 0) + 1; });
    tf.push(ft);
    for (var k in ft) df[k] = (df[k] || 0) + 1;
  }
  ad /= N;
  return function(q) {
    var qt = q.toLowerCase().split(/\s+/).filter(function(t) { return t.length > 1; }), sc = [];
    for (var i = 0; i < N; i++) {
      var s = 0, l = ln[i], ft = tf[i];
      for (var j = 0; j < qt.length; j++) {
        var f = ft[qt[j]] || 0; if (!f) continue;
        var idf = Math.log((N - (df[qt[j]] || 0) + 0.5) / ((df[qt[j]] || 0) + 0.5) + 1);
        s += idf * ((f * (k1 + 1)) / (f + k1 * (1 - b + b * (l / ad))));
      }
      sc.push({ i: i, s: s });
    }
    sc.sort(function(a, b) { return b.s - a.s; });
    return sc.filter(function(x) { return x.s > 0; });
  };
}

// ── Search ──
function onSearch() { clearTimeout(window._st); window._st = setTimeout(doSearch, 300); }

function doSearch() {
  if (!IX) return;
  var q = document.getElementById('search-input').value.trim();
  if (!q) { showP(0); return; }
  document.getElementById('status').textContent = 'Searching...';
  var ns = IX.nodes;
  if (_F !== 'all') ns = ns.filter(function(n) { return n.t === _F; });
  if (_E) ns = ns.filter(function(n) { return mE(n, _E); });
  if (!bm) bm = buildBM(IX.nodes);
  var sc = bm(q), rs = sc.slice(0, 50).map(function(x) { return { node: ns[x.i], score: x.s }; });
  render(rs);
}

function render(rs) {
  var d = document.getElementById('results'), s = document.getElementById('status');
  if (!rs.length) { s.textContent = 'No results'; d.innerHTML = '<div style=text-align:center;padding:40px;color:var(--text3)>No matching entities</div>'; return; }
  s.textContent = rs.length + ' results';
  d.innerHTML = rs.map(function(r) {
    var n = r.node, tc = 'badge-' + (n.t || 'other');
    return '<div class=card onclick="showD(\'' + n.id + '\')"><div class=card-hdr><span class=card-title>' + esc(n.l) + '</span>' + (n.lv ? ' <span class=card-title-vi>' + esc(n.lv) + '</span>' : '') + ' <span class="badge ' + tc + '">' + (n.t || 'other') + '</span></div><div class=card-desc>' + esc(n.d || '') + '</div><div class=card-note>BM25: ' + r.score.toFixed(4) + '</div></div>';
  }).join('');
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function setF(t) { _F = t; _P = 0;
  document.querySelectorAll('.fbtn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('onclick').indexOf(t) >= 0); });
  var q = document.getElementById('search-input').value.trim(); q ? doSearch() : showP(0);
}

function setE(e) { _E = _E === e ? null : e;
  document.querySelectorAll('.ebtn').forEach(function(b) { b.classList.toggle('active', b.getAttribute('onclick').indexOf(e) >= 0); });
  var q = document.getElementById('search-input').value.trim(); q ? doSearch() : showP(0);
}

function mE(n, e) {
  if (!n.m) return false;
  var era = { hong_bang: [-2879, -258], chinese_domination: [-111, 939], dynastic_vn: [939, 1858], colonial: [1858, 1954], vietnam_war: [1955, 1975], modern: [1975, 9999] }, r = era[e];
  if (!r) return false;
  var f = ['point_in_time', 'start_time', 'birth_date', 'death_date'];
  for (var i = 0; i < f.length; i++) {
    var v = n.m[f[i]];
    if (v) { var m = String(v).match(/(-?\d{4})/); if (m) { var y = parseInt(m[1], 10); if (y >= r[0] && y <= r[1]) return true; } }
  }
  return false;
}

function showP(p) {
  if (!IX) return; _P = p;
  var ns = IX.nodes; if (_F !== 'all') ns = ns.filter(function(n) { return n.t === _F; });
  if (_E) ns = ns.filter(function(n) { return mE(n, _E); });
  var t = ns.length, pg = Math.ceil(t / PS), st = p * PS, en = Math.min(st + PS, t);
  document.getElementById('status').textContent = t.toLocaleString() + ' total - page ' + (p + 1) + '/' + pg;
  document.getElementById('results').innerHTML = ns.slice(st, en).map(function(n) {
    var tc = 'badge-' + (n.t || 'other');
    return '<div class=card onclick="showD(\'' + n.id + '\')"><div class=card-hdr><span class=card-title>' + esc(n.l) + '</span>' + (n.lv ? ' <span class=card-title-vi>' + esc(n.lv) + '</span>' : '') + ' <span class="badge ' + tc + '">' + (n.t || 'other') + '</span></div><div class=card-desc>' + esc(n.d || '') + '</div></div>';
  }).join('');
  document.getElementById('pag').innerHTML = '<div class=pag>' + (p > 0 ? '<button class=fbtn onclick="showP(' + (p - 1) + ')">&larr; Prev</button>' : '') + '<span style=color:var(--text3);padding:6px>' + (p + 1) + ' / ' + pg + '</span>' + (en < t ? '<button class=fbtn onclick="showP(' + (p + 1) + ')">Next &rarr;</button>' : '') + '</div>';
}

function showD(id) {
  var n = IX.nodes.find(function(x) { return x.id === id; }); if (!n) return;
  var rel = IX.edges.filter(function(e) { return e.s === id; }).slice(0, 30), meta = '';
  if (n.m) { var ks = Object.keys(n.m); if (ks.length) meta = '<dl class=p-meta>' + ks.map(function(k) { return '<dt>' + esc(k) + '</dt><dd>' + esc(n.m[k]) + '</dd>'; }).join('') + '</dl>'; }
  document.getElementById('dc').innerHTML = '<div class=p-title>' + esc(n.l) + '</div>' + (n.lv ? '<div class=p-title-vi>' + esc(n.lv) + '</div>' : '') + '<span class="badge badge-' + (n.t || 'other') + '">' + (n.t || 'other') + '</span><div class=p-desc>' + esc(n.d || '') + '</div>' + meta + '<div class=p-sec><h3>Relations (' + rel.length + ')</h3>' + (rel.length ? rel.map(function(e) { return '<div class=p-rel onclick="showD(\'' + e.t + '\')"><span>' + esc(e.r) + '</span><span class=rarr>&rarr;</span><strong>' + esc(e.tl || e.t) + '</strong></div>'; }).join('') : '<span style=color:var(--text3);font-size:.82rem>No relations</span>') + '</div><div style=margin-top:10px><a href=' + esc(n.u) + ' target=_blank style=color:var(--a1);font-size:.82rem>Open in WikiData &rarr;</a></div>';
  document.getElementById('overlay').classList.add('open');
}

function closeD(e) { if (e && e.target !== document.getElementById('overlay')) return; document.getElementById('overlay').classList.remove('open'); }

function setLang(l) {
  _L = l;
  document.getElementById('lang-en').className = 'lang-btn' + (l === 'en' ? ' active' : '');
  document.getElementById('lang-vi').className = 'lang-btn' + (l === 'vi' ? ' active' : '');
  document.querySelectorAll('[data-en]').forEach(function(el) { el.textContent = l === 'vi' ? (el.getAttribute('data-vi') || el.textContent) : (el.getAttribute('data-en') || el.textContent); });
}

// ── Init ──
document.addEventListener('DOMContentLoaded', function() {
  loadData();
  setTimeout(function() {
    if (typeof transformers !== 'undefined') {
      transformers.pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2', { quantized: true }).then(function(m) { MODEL = m; MR = true; });
    }
  }, 3000);
});
</script>
